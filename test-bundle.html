<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صمم باقتك بنفسك - إيفال</title>
    
    <link rel="icon" type="image/png" href="minilogo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=El+Messiri:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #050507 !important; 
            margin: 0; 
            padding: 20px; 
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            direction: rtl;
        }

        .eval-container { 
            max-width: 1100px; 
            margin: 40px auto; 
            background: transparent; 
            padding: 20px; 
        }

        .page-title {
            font-family: 'El Messiri', serif !important;
            color: #D4AF37;
            text-align: center;
            margin-bottom: 2px; 
            font-size: 2.2rem; 
        }

        .page-title span { color: #ffffff; }

        .eval-desc {
            font-family: 'Cairo', sans-serif;
            color: #ffffff;
            opacity: 0.9;
            text-align: center;
            margin-top: 0; 
            margin-bottom: 45px;
            font-size: 1.1rem;
        }

        .gold-highlight {
            display: inline; 
            font-size: 1.2rem; 
            font-weight: 600;
            background: linear-gradient(45deg, #D4AF37, #F2D27D, #B8891A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 3px;
        }

        .eval-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        .tool-item { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .tool-item:hover { 
            border-color: #D4AF37; 
            background: rgba(212, 175, 55, 0.05);
        }

        .tool-item.selected { 
            border-color: #D4AF37; 
            background: rgba(212, 175, 55, 0.1); 
        }

        .tool-item input[type="checkbox"] { 
            width: 20px; 
            height: 20px; 
            accent-color: #D4AF37; 
            pointer-events: none; 
            margin-right: 15px;
        }

        .tool-text-wrapper { text-align: right; flex: 1; }

        .tool-name { 
            color: #D4AF37; 
            font-weight: bold; 
            font-family: 'El Messiri'; 
            font-size: 1rem; 
            margin-bottom: 3px; 
        }

        .tool-desc { color: #b0b0b0; font-size: 0.75rem; font-family: 'Cairo'; margin-bottom: 5px; }

        /* تغيير لون السعر للأبيض */
        .tool-price { 
            color: #ffffff; 
            font-weight: 900; 
            font-family: 'Cairo'; 
            font-size: 1.1rem; 
        }

        #summary-box { 
            display: none; 
            background: rgba(255, 255, 255, 0.02); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px dashed rgba(212, 175, 55, 0.4); 
            text-align: center; 
            margin: 25px auto 0 auto; 
            animation: fadeIn 0.5s ease;
            max-width: 500px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #total-old { 
            color: #ffffff; 
            font-size: 0.9rem; 
            margin: 0 0 2px 0; 
            text-decoration: line-through; 
            opacity: 0.7;
            font-family: 'Cairo';
        }
        
        #total-new { 
            color: #D4AF37; 
            font-size: 1.5rem; 
            font-weight: 550; 
            margin: 0 0 15px 0; 
            font-family: 'Cairo';
        }

        .btn-send { 
            background: linear-gradient(45deg, #D4AF37, #f2d06b); 
            color: #050507; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 8px; 
            font-family: 'El Messiri';
            font-weight: 900; 
            cursor: pointer; 
            font-size: 1rem; 
            min-width: 250px;
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .btn-send:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        @media (max-width: 768px) { 
            .page-title { font-size: 1.4rem !important; } 
            .eval-desc { font-size: 0.90rem !important; }
            .gold-highlight { font-size: 1rem; } 
            .eval-grid { grid-template-columns: 1fr; } 
            #summary-box { padding: 12px; margin-top: 20px; }
            #total-new { 
                font-size: 1.1rem; 
                font-weight: 600; 
            }
            .btn-send { font-size: 0.95rem; min-width: 100%; padding: 10px; }
        }
    </style>
</head>
<body>

<div class="eval-container">
    <div style="text-align: center;">
        <h1 class="page-title">صمّم باقتك <span>الخاصة</span></h1>
        <p class="eval-desc">اختر أداتين أو أكثر واحصل على <span class="gold-highlight">خصم 15%</span></p>
    </div>

    <div id="bundle-grid" class="eval-grid"></div>

    <div id="summary-box">
        <p id="total-old"></p>
        <p id="total-new"></p>
        <button class="btn-send" onclick="sendFinalEmail()">طلب الباقة المختارة</button>
    </div>
</div>

<script>
const evalStore = [
    { name: "خدمة الدعم (لمدة شهر)", desc: "تطوير الذات - دعم النفسي - تقدم المهني", price: 46 },
    { name: "اجندة ايفال الذكية (360 يوم)", desc: "مع هدية: 40 تصميم محفّز يرفع التزامك", price: 35 },
    { name: "10 خطوات لاكتشاف ذاتك وتحقيق اهدافك", desc: "كتاب رقمي مع نسخة صوتية ثلاثية الأبعاد", price: 17 },
    { name: "خطة لـ112 يوم", desc: "خطة يومية تساعدك تلتزم وتنجز بدون ضغط", price: 13 },
    { name: "7 خطوات وجداول لتنظيم الوقت", desc: "نظام عملي لاستعادة السيطرة على وقتك", price: 9 },
    { name: "اداة الامتنان الواعي", desc: "لإعادة برمجة نظرتك للحياة والرضا الداخلي", price: 12 },
    { name: "مكتبة بودكاست (40 حلقة)", desc: "لبناء عقلك ومستقبلك", price: 14 },
    { name: "7 تحديات لرفع الاهتمام بالنفس", desc: "يشمل مراجعة وتحليل لنتائجك من قبل فريق إيفال", price: 27 },
    { name: "6 جلسات ترددات ذهنية", desc: "لتهدئة العقل وتنظيم الأفكار المتراكمة ورفع التركيز", price: 12 },
    { name: "7 تمارين لتنشيط العقل", desc: "يشمل مراجعة وتحليل لنتائجك من قبل فريق إيفال", price: 27 },
    { name: "14 بطاقات تحدي للعادات السلبية", desc: "يشمل مراجعة وتحليل لنتائجك من قبل فريق إيفال", price: 29 }
];

const grid = document.getElementById('bundle-grid');
evalStore.forEach((item, i) => {
    grid.innerHTML += `
        <div class="tool-item" id="item-${i}" onclick="toggleSelect(${i})">
            <div class="tool-text-wrapper">
                <div class="tool-name">${item.name}</div>
                <div class="tool-desc">${item.desc}</div>
                <div class="tool-price">$${item.price}</div>
            </div>
            <input type="checkbox" id="check-${i}">
        </div>
    `;
});

function toggleSelect(i) {
    const cb = document.getElementById(`check-${i}`);
    const card = document.getElementById(`item-${i}`);
    cb.checked = !cb.checked;
    cb.checked ? card.classList.add('selected') : card.classList.remove('selected');
    calculate();
}

function calculate() {
    const selected = document.querySelectorAll('input[type="checkbox"]:checked');
    let subtotal = 0;
    selected.forEach(s => {
        const priceText = s.parentElement.querySelector('.tool-price').innerText;
        subtotal += parseFloat(priceText.replace('$', ''));
    });

    const box = document.getElementById('summary-box');
    if (selected.length > 0) {
        box.style.display = 'block';
        if (selected.length >= 2) {
            document.getElementById('total-old').innerText = "المجموع الأصلي: $" + subtotal;
            document.getElementById('total-new').innerText = "السعر بعد الخصم: $" + (subtotal * 0.85).toFixed(2);
        } else {
            document.getElementById('total-old').innerText = "";
            document.getElementById('total-new').innerText = "المجموع: $" + subtotal;
        }
    } else { box.style.display = 'none'; }
}

function sendFinalEmail() {
    const items = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => {
        items.push(c.parentElement.querySelector('.tool-name').innerText);
    });
    const oldP = document.getElementById('total-old').innerText;
    const newP = document.getElementById('total-new').innerText;
    const emailTo = "orders@evallsuccess.com";
    const rtl = "\u200f"; 
    const body = rtl + "اهلاً فريق إيفال،" + "\n\n" + rtl + "أود طلب الباقة التي أنشأتها:" + "\n" + items.map(n => rtl + "- " + n).join("\n") + "\n\n" + rtl + "-----------------------" + "\n" + rtl + (oldP ? oldP : "المجموع: " + newP) + "\n" + rtl + (oldP ? newP : "") + "\n" + rtl + "-----------------------" + "\n\n" + rtl + "بانتظار رابط الدفع الخاص بي لإتمام الطلب." + "\n\n" + rtl + "شكراً لكم.";
    window.open(`mailto:${emailTo}?subject=${encodeURIComponent("طلب الباقة المختارة - إيفال")}&body=${encodeURIComponent(body)}`, '_blank');
}
</script>
</body>
</html>
