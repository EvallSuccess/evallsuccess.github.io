<section id="eval-custom-bundle" style="padding: 60px 20px; background-color: #000000; direction: rtl; font-family: 'El Messiri', 'Cairo', sans-serif;">
    <div style="max-width: 900px; margin: 0 auto; background: #0a0a0a; padding: 40px; border-radius: 35px; border: 1px solid #d4a373; box-shadow: 0 10px 30px rgba(212, 163, 115, 0.1);">
        
        <div style="text-align: center; margin-bottom: 40px;">
            <h2 style="color: #d4a373; font-size: 2.2rem; margin-bottom: 15px; font-family: 'El Messiri', sans-serif;">صمّمي باقتكِ الخاصة من إيفال</h2>
            <p style="color: #e0e0e0; font-size: 1.1rem; font-family: 'Cairo', sans-serif;">
                اختاري الأدوات التي تحتاجينها.. واحصلي على <span style="color: #d4a373; font-weight: bold;">خصم 15%</span> عند اختيار 2 أو أكثر.
            </p>
        </div>
 
        <div id="grid-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px;">
            </div>
 
        <div id="eval-summary" style="display: none; background: #111; padding: 30px; border-radius: 20px; border: 2px dashed #d4a373; text-align: center;">
            <p id="old-price" style="color: #777; text-decoration: line-through; margin-bottom: 5px; font-family: 'Cairo', sans-serif;"></p>
            <p id="new-price" style="color: #d4a373; font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; font-family: 'El Messiri', sans-serif;"></p>
            
            <button onclick="sendEvalEmail()" style="background: #d4a373; color: #000; padding: 15px 45px; border: none; border-radius: 50px; font-weight: bold; font-family: 'Cairo', sans-serif; cursor: pointer; font-size: 1.1rem; transition: 0.3s;">
                إرسال طلب الباقة المخصصة
            </button>
        </div>
    </div>
</section>
 
<script>
const myTools = [
    { n: "أجندة إيفال (360 يوم)", p: 35, i: "📖" },
    { n: "كتابة رحلة تحول (3D)", p: 24, i: "🎧" },
    { n: "جدول المهام (112 يوم)", p: 15, i: "📅" },
    { n: "نظام السيطرة على الوقت", p: 9, i: "⏳" },
    { n: "دفتر الامتنان الواعي", p: 12, i: "✨" },
    { n: "مكتبة البودكاست التعليمية", p: 15, i: "🎙️" },
    { n: "تحديات العناية (مع متابعة)", p: 27, i: "🌸" },
    { n: "جلسات الترددات الذهنية", p: 11, i: "🧠" },
    { n: "تمارين نشاط العقل (مع تحليل)", p: 27, i: "⚡" },
    { n: "نظام التخلص من العادات", p: 27, i: "🔄" }
];
 
const container = document.getElementById('grid-container');
 
myTools.forEach((tool, index) => {
    container.innerHTML += `
        <div class="card" onclick="handleSelect(${index})" id="card-${index}" style="background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #333; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s;">
            <input type="checkbox" id="check-${index}" style="width: 20px; height: 20px; accent-color: #d4a373; pointer-events: none;">
            <div style="flex-grow: 1; text-align: right;">
                <div style="color: #fff; font-weight: bold; font-family: 'Cairo', sans-serif; font-size: 1rem;">${tool.n}</div>
                <div style="color: #d4a373; font-size: 0.9rem;">$${tool.p}</div>
            </div>
            <div style="font-size: 1.5rem;">${tool.i}</div>
        </div>
    `;
});
 
let selectedIndexes = [];
 
function handleSelect(idx) {
    const cb = document.getElementById(`check-${idx}`);
    const card = document.getElementById(`card-${idx}`);
    
    cb.checked = !cb.checked;
    
    if(cb.checked) {
        card.style.borderColor = "#d4a373";
        card.style.background = "#1a1a1a";
    } else {
        card.style.borderColor = "#333";
        card.style.background = "#121212";
    }
    renderSummary();
}
 
function renderSummary() {
    const checks = document.querySelectorAll('input[type="checkbox"]:checked');
    let total = 0;
    checks.forEach(c => total += parseFloat(c.parentElement.querySelector('div div:last-child').innerText.replace('$', '')));
 
    const sumDiv = document.getElementById('eval-summary');
    if(checks.length > 0) {
        sumDiv.style.display = 'block';
        if(checks.length >= 2) {
            document.getElementById('old-price').innerText = "المجموع: $" + total;
            document.getElementById('new-price').innerText = "السعر بعد الخصم: $" + (total * 0.85).toFixed(2);
        } else {
            document.getElementById('old-price').innerText = "";
            document.getElementById('new-price').innerText = "المجموع: $" + total;
        }
    } else {
        sumDiv.style.display = 'none';
    }
}
 
function sendEvalEmail() {
    const selected = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => {
        selected.push(c.parentElement.querySelector('div div:first-child').innerText);
    });
    
    const mailTo = "evallonline1@gmail.com";
    const subject = "طلب باقة مخصصة - إيفال";
    const body = `مرحباً فريق إيفال،\n\nأود طلب الباقة المخصصة التي تحتوي على:\n- ${selected.join('\n- ')}\n\nبانتظار رابط الدفع.`;
    
    window.open(`mailto:${mailTo}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
}
</script>
