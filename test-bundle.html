<section id="eval-final-bundle" style="padding: 40px 10px; background-color: #000; direction: rtl; font-family: 'El Messiri', 'Cairo', sans-serif !important;">
    <div style="max-width: 1000px; margin: 0 auto; background: #000; padding: 20px; border-radius: 20px; border: 1px solid #d4a373;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #d4a373; font-size: 2rem; margin-bottom: 10px;">صمّمي باقتكِ الخاصة من إيفال</h2>
            <p style="color: #fff; font-size: 1rem;">اختاري الأدوات التي تحتاجينها.. واحصلي على <span style="color: #d4a373; font-weight: bold;">خصم 15%</span> عند اختيار 2 أو أكثر.</p>
        </div>

        <div id="bundle-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px;">
            </div>

        <div id="price-box" style="display: none; background: #111; padding: 25px; border-radius: 15px; border: 2px dashed #d4a373; text-align: center; color: #fff;">
            <p id="old-p" style="text-decoration: line-through; color: #888; margin-bottom: 5px;"></p>
            <p id="new-p" style="color: #d4a373; font-size: 1.8rem; font-weight: bold; margin-bottom: 20px;"></p>
            
            <button onclick="sendFinalEmail()" style="background: #d4a373; color: #000; padding: 15px 40px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; width: 100%; max-width: 300px;">
                إرسال طلب الباقة المخصصة
            </button>
        </div>
    </div>
</section>

<script>
// قائمة الأدوات (بدون أيقونات وبأسعارك المعتمدة)
const evalStore = [
    { name: "أجندة إيفال (360 يوم)", price: 35 },
    { name: "كتابة رحلة تحول (3D)", price: 24 },
    { name: "جدول المهام (112 يوم)", price: 15 },
    { name: "نظام السيطرة على الوقت", price: 9 },
    { name: "دفتر الامتنان الواعي", price: 12 },
    { name: "مكتبة البودكاست التعليمية", price: 15 },
    { name: "تحديات العناية (مع متابعة)", price: 27 },
    { name: "جلسات الترددات الذهنية", price: 11 },
    { name: "تمارين نشاط العقل (مع تحليل)", price: 27 },
    { name: "نظام التخلص من العادات", price: 27 }
];

const grid = document.getElementById('bundle-grid');

evalStore.forEach((item, i) => {
    grid.innerHTML += `
        <div onclick="selectItem(${i})" id="item-${i}" style="background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s;">
            <div style="text-align: right;">
                <div style="color: #fff; font-weight: bold; margin-bottom: 5px; font-size: 1rem;">${item.name}</div>
                <div style="color: #d4a373; font-weight: bold;">$${item.price}</div>
            </div>
            <input type="checkbox" id="check-${i}" style="width: 25px; height: 25px; accent-color: #d4a373; cursor: pointer; pointer-events: none;">
        </div>
    `;
});

function selectItem(index) {
    const cb = document.getElementById(`check-${index}`);
    const card = document.getElementById(`item-${index}`);
    cb.checked = !cb.checked;
    
    card.style.borderColor = cb.checked ? "#d4a373" : "#333";
    card.style.background = cb.checked ? "#1a130a" : "#111";
    
    updatePrice();
}

function updatePrice() {
    const selected = document.querySelectorAll('input[type="checkbox"]:checked');
    let total = 0;
    selected.forEach(s => {
        const price = s.parentElement.querySelector('div div:last-child').innerText.replace('$', '');
        total += parseFloat(price);
    });

    const box = document.getElementById('price-box');
    if (selected.length > 0) {
        box.style.display = 'block';
        if (selected.length >= 2) {
            document.getElementById('old-p').innerText = "المجموع الأصلي: $" + total;
            document.getElementById('new-p').innerText = "السعر بعد خصم (15%): $" + (total * 0.85).toFixed(2);
        } else {
            document.getElementById('old-p').innerText = "";
            document.getElementById('new-p').innerText = "المجموع: $" + total;
        }
    } else {
        box.style.display = 'none';
    }
}

function sendFinalEmail() {
    const chosen = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => {
        chosen.push(c.parentElement.querySelector('div div:first-child').innerText);
    });

    // هنا يمكنكِ تعديل نص الإيميل بسهولة
    const emailTo = "evallonline1@gmail.com";
    const subject = encodeURIComponent("طلب باقة مخصصة - منصة إيفال");
    const message = encodeURIComponent(
        "أهلاً فريق إيفال،\n\n" +
        "لقد قمت باختيار مجموعة من الأدوات وأرغب في الحصول على الباقة المخصصة:\n\n" +
        "- " + chosen.join("\n- ") + 
        "\n\nأنتظر منكم إرسال رابط الدفع مع كود الخصم (15%).\n\nشكراً لكم."
    );

    window.open(`mailto:${emailTo}?subject=${subject}&body=${message}`, '_blank');
}
</script>
